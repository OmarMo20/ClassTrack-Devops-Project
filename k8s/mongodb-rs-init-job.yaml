apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-rs-init
spec:
  # If this Job is re-applied after the replica set already exists, rs.initiate()
  # will just fail loudly (already initialized) - that's fine, ignore/delete the Job then.
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-rs-init
          image: mongo:6-jammy
          command:
            - bash
            - "-c"
            - |
              set -e
              # Wait until all 3 members are resolvable/reachable before initiating
              for host in mongodb-0.mongodb-headless mongodb-1.mongodb-headless mongodb-2.mongodb-headless; do
                until mongosh --host "$host" --quiet --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
                  echo "Waiting for $host..."
                  sleep 5
                done
              done

              mongosh --host mongodb-0.mongodb-headless --quiet --eval '
                rs.initiate({
                  _id: "rs0",
                  members: [
                    { _id: 0, host: "mongodb-0.mongodb-headless:27017" },
                    { _id: 1, host: "mongodb-1.mongodb-headless:27017" },
                    { _id: 2, host: "mongodb-2.mongodb-headless:27017" }
                  ]
                })
              '
