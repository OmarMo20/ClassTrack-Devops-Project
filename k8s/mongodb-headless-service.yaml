apiVersion: v1
kind: Service
metadata:
  name: mongodb-headless
spec:
  clusterIP: None    # Headless: gives each pod a stable DNS name
                      # (mongodb-0.mongodb-headless, mongodb-1.mongodb-headless, ...)
                      # instead of load-balancing across replicas, which a real
                      # Mongo replica set needs for its members to find each other.
  selector:
    component: mongodb
  ports:
    - port: 27017
      targetPort: 27017
