worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging Settings
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip Settings
    gzip on;

    # Centralized rate limiting: 10 requests/sec per client IP, with a small
    # burst allowance. This used to be duplicated per-service (each Node
    # service had its own RATE_LIMIT_* env vars) - doing it once here at the
    # gateway is what an API Gateway is actually for.
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    server {
        listen 5000;

        limit_req zone=api_limit burst=20 nodelay;

        # Health check for gateway itself
        location /gateway-health {
            access_log off;
            add_header 'Content-Type' 'application/json';
            return 200 '{"status":"UP","message":"API Gateway is running"}';
        }

        # ── Public auth endpoints - no token required ──────────────────────
        # Must be matched before the general /api/(auth|assistants|admin)
        # block below, since these specific paths must NOT go through
        # auth_request (there's no token yet at register/login time).
        location ~ ^/api/auth/(register|login|verify-otp|resend-otp|forgot-password|validate-otp|reset-password)$ {
            proxy_pass http://auth-service-cluster-ip-service:5001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Internal-only target for auth_request. Calls auth-service's
        # lightweight /api/auth/verify-token endpoint; nginx only looks at
        # the status code (200/401) it returns, never the body, so we skip
        # forwarding the request body entirely to keep it cheap.
        location = /_verify_token {
            internal;
            proxy_pass http://auth-service-cluster-ip-service:5001/api/auth/verify-token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # ── Protected auth-service routes (profile, logout, change-password,
        # assistants, admin) - centralized auth check happens here now,
        # instead of trusting every downstream service to re-check the JWT.
        location ~ ^/api/(auth|assistants|admin) {
            auth_request /_verify_token;
            proxy_pass http://auth-service-cluster-ip-service:5001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Student portal routes (public - parent/student self-service login,
        # register, forgot/reset password) - intentionally NOT behind
        # auth_request, same reasoning as the public auth block above.
        location ~ ^/api/students/(portal|add) {
            proxy_pass http://student-service-cluster-ip-service:5003;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Staff service (core CRUD for students, sessions, attendance, etc.)
        # - everything else under /api is a protected, logged-in-only route.
        location /api {
            auth_request /_verify_token;
            proxy_pass http://staff-service-cluster-ip-service:5002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Default fallback
        location / {
            proxy_pass http://staff-service-cluster-ip-service:5002;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
